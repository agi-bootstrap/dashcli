name: all-charts-dashboard
title: Sales Overview — All Chart Types
source: ./sales.csv
refresh: manual

filters:
  - id: date_range
    type: date_range
    column: date
    default: ["2025-04-01", "2026-03-31"]
  - id: region
    type: multi_select
    column: region
    default: []
  - id: revenue_range
    type: range
    column: revenue
    default: [0, 250000]
  - id: category_search
    type: text
    column: product_category
    default: ""

layout:
  columns: 3
  rows: auto

charts:
  # KPI shortcut
  - id: total_revenue
    type: kpi
    query: "SELECT SUM(revenue) as value FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}}"
    label: Total Revenue
    format: currency
    position: [0, 0, 1, 1]

  # Custom gauge — avg deal size
  - id: avg_deal_size
    type: custom
    query: "SELECT ROUND(CAST(SUM(revenue) AS REAL) / SUM(deals), 0) as value FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}}"
    label: Avg Deal Size
    position: [1, 0, 1, 1]
    option:
      series:
        - type: gauge
          min: 0
          max: 50000
          data: [{ value: "$row0.value" }]
          pointer: { width: 4, length: "60%", itemStyle: { color: "#1a1a1a" } }
          detail: { fontSize: 20, fontWeight: 700, color: "#1a1a1a", offsetCenter: [0, "70%"] }
          title: { show: false }

  # Custom gauge — win rate
  - id: win_rate
    type: custom
    query: "SELECT ROUND(CAST(SUM(deals) AS REAL) / COUNT(*) * 10, 1) as value FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}}"
    label: Win Rate
    position: [2, 0, 1, 1]
    option:
      series:
        - type: gauge
          min: 0
          max: 100
          data: [{ value: "$row0.value" }]
          pointer: { width: 4, length: "60%", itemStyle: { color: "#1a1a1a" } }
          detail: { fontSize: 20, fontWeight: 700, color: "#1a1a1a", offsetCenter: [0, "70%"] }
          title: { show: false }

  # Custom bar chart
  - id: by_region_bar
    type: custom
    query: "SELECT region, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region ORDER BY revenue DESC"
    label: Revenue by Region
    position: [0, 1, 1, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: category }
      yAxis: {}
      tooltip: { trigger: axis }
      series:
        - type: bar
          encode: { x: region, y: revenue }

  # Custom pie chart
  - id: by_region_pie
    type: custom
    query: "SELECT region, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region ORDER BY revenue DESC"
    label: Revenue Split
    position: [1, 1, 1, 1]
    option:
      tooltip: { trigger: item }
      series:
        - type: pie
          radius: ["40%", "70%"]
          data: "$rows"
          encode: { value: revenue, itemName: region }

  # Custom line chart
  - id: trend
    type: custom
    query: "SELECT date as month, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY date ORDER BY date"
    label: Revenue Trend
    position: [2, 1, 1, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: category }
      yAxis: {}
      tooltip: { trigger: axis }
      series:
        - type: line
          encode: { x: month, y: revenue }

  # Custom scatter chart
  - id: deals_vs_revenue
    type: custom
    query: "SELECT SUM(deals) as deals, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region, product_category"
    label: Deals vs Revenue
    position: [0, 2, 2, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: value }
      yAxis: { type: value }
      tooltip: { trigger: item }
      series:
        - type: scatter
          encode: { x: deals, y: revenue }

  # Custom area chart
  - id: revenue_area
    type: custom
    query: "SELECT date as month, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY date ORDER BY date"
    label: Revenue Trend (Area)
    position: [0, 3, 1, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: category }
      yAxis: {}
      tooltip: { trigger: axis }
      series:
        - type: line
          encode: { x: month, y: revenue }
          areaStyle: { opacity: 0.15 }

  # Custom stacked bar chart
  - id: revenue_stacked
    type: custom
    query: "SELECT region, product_category, SUM(revenue) as revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region, product_category ORDER BY region"
    label: Revenue by Region (Stacked)
    position: [1, 3, 1, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: category }
      yAxis: {}
      tooltip: { trigger: axis }
      legend: {}
      series:
        - type: bar
          stack: total
          encode: { x: region, y: revenue, seriesName: product_category }

  # Custom funnel chart
  - id: deal_funnel
    type: custom
    query: "SELECT product_category as stage, SUM(deals) as deals FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY product_category ORDER BY deals DESC"
    label: Deals by Category
    position: [2, 3, 1, 1]
    option:
      tooltip: { trigger: item }
      series:
        - type: funnel
          left: "10%"
          width: "80%"
          data: "$rows"
          encode: { value: deals, itemName: stage }

  # Custom heatmap chart
  - id: revenue_heatmap
    type: custom
    query: "SELECT region, product_category, SUM(revenue) as total_revenue FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region, product_category"
    label: Revenue Heatmap
    position: [0, 4, 2, 1]
    option:
      dataset: { source: "$rows" }
      xAxis: { type: category, data: "$distinct.region" }
      yAxis: { type: category, data: "$distinct.product_category" }
      visualMap: { min: 0, max: 250000, inRange: { color: ["#f0f4ff", "#2563eb"] }, show: false }
      series:
        - type: heatmap
          encode: { x: region, y: product_category, value: total_revenue }

  # Table shortcut
  - id: detail_table
    type: table
    query: "SELECT region, product_category, SUM(revenue) as revenue, SUM(deals) as deals FROM sales WHERE {{date_range}} AND {{region}} AND {{revenue_range}} AND {{category_search}} GROUP BY region, product_category ORDER BY revenue DESC"
    label: Revenue by Region & Category
    position: [2, 4, 1, 1]
